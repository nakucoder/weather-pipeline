name: Weather Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test API health
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python -c "from app.weather import fetch_miami_weather; data = fetch_miami_weather(); assert data is not None; print('Weather fetch: OK')"
          python -c "from app.config import MIAMI_LATITUDE, MIAMI_LONGITUDE; assert MIAMI_LATITUDE == 25.7617; print('Config: OK')"

      - name: Build Docker image
        run: docker build -t weather-pipeline .